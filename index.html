<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Kreaglobe CRM — WhatsApp Business</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
:root {
  --green: #25D366;
  --green-dark: #128C7E;
  --green-light: #DCF8C6;
  --bg: #f4f6f8;
  --sidebar-bg: #1a1f2e;
  --sidebar-text: #a8b3cf;
  --sidebar-active: #ffffff;
  --card-bg: #ffffff;
  --border: #e8ecf0;
  --text-primary: #1a1f2e;
  --text-secondary: #6b7694;
  --text-muted: #9ba8c2;
  --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.04);
  --shadow-md: 0 4px 24px rgba(0,0,0,0.10);
  --radius: 12px;
  --radius-sm: 8px;
  --radius-xs: 6px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text-primary);
  display: flex;
  height: 100vh;
  overflow: hidden;
}

/* ─── SIDEBAR ─── */
.sidebar {
  width: 240px;
  background: var(--sidebar-bg);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  height: 100vh;
  overflow: hidden;
}

.sidebar-logo {
  padding: 22px 20px 18px;
  border-bottom: 1px solid rgba(255,255,255,0.06);
}

.logo-mark {
  display: flex;
  align-items: center;
  gap: 10px;
}

.logo-icon {
  width: 36px;
  height: 36px;
  background: var(--green);
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  flex-shrink: 0;
}

.logo-text {
  color: #fff;
  font-size: 16px;
  font-weight: 600;
  letter-spacing: -0.02em;
}

.logo-sub {
  color: var(--sidebar-text);
  font-size: 11px;
  margin-top: 1px;
}

.sidebar-nav {
  padding: 16px 12px;
  flex: 1;
  overflow-y: auto;
}

.nav-section-label {
  font-size: 10px;
  font-weight: 600;
  color: rgba(168,179,207,0.5);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 8px 8px 6px;
  margin-top: 8px;
}

.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 10px;
  border-radius: 8px;
  cursor: pointer;
  color: var(--sidebar-text);
  font-size: 13.5px;
  font-weight: 400;
  transition: all 0.15s;
  margin-bottom: 2px;
  border: none;
  background: none;
  width: 100%;
  text-align: left;
}

.nav-item:hover { background: rgba(255,255,255,0.06); color: #fff; }
.nav-item.active { background: rgba(37,211,102,0.15); color: #fff; }
.nav-item.active .nav-icon { color: var(--green); }

.nav-icon { font-size: 16px; width: 18px; text-align: center; flex-shrink: 0; }

.nav-badge {
  margin-left: auto;
  background: var(--green);
  color: #fff;
  font-size: 10px;
  font-weight: 600;
  border-radius: 99px;
  padding: 1px 7px;
  min-width: 20px;
  text-align: center;
}

.nav-badge.red { background: #e24b4a; }
.nav-badge.amber { background: #EF9F27; }

.sidebar-labels {
  padding: 0 12px 12px;
}

.label-nav-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 7px 10px;
  border-radius: 8px;
  cursor: pointer;
  color: var(--sidebar-text);
  font-size: 12.5px;
  transition: all 0.15s;
  margin-bottom: 1px;
  border: none;
  background: none;
  width: 100%;
  text-align: left;
}

.label-nav-item:hover { background: rgba(255,255,255,0.06); color: #fff; }
.label-nav-item.active { color: #fff; }

.label-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.label-cnt { margin-left: auto; font-size: 11px; color: rgba(168,179,207,0.6); font-family: 'DM Mono', monospace; }

.sidebar-footer {
  padding: 14px 16px;
  border-top: 1px solid rgba(255,255,255,0.06);
}

.user-pill {
  display: flex;
  align-items: center;
  gap: 10px;
}

.user-avatar {
  width: 32px;
  height: 32px;
  background: var(--green);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: 600;
  color: #fff;
  flex-shrink: 0;
}

.user-name { color: #fff; font-size: 13px; font-weight: 500; }
.user-role { color: var(--sidebar-text); font-size: 11px; }

/* ─── MAIN CONTENT ─── */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  min-width: 0;
}

.topbar {
  background: #fff;
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  height: 60px;
  display: flex;
  align-items: center;
  gap: 16px;
  flex-shrink: 0;
}

.topbar-title {
  font-size: 16px;
  font-weight: 600;
  color: var(--text-primary);
}

.topbar-spacer { flex: 1; }

.search-bar {
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 0 14px;
  height: 36px;
  width: 240px;
}

.search-bar input {
  border: none;
  background: transparent;
  font-size: 13px;
  color: var(--text-primary);
  outline: none;
  width: 100%;
  font-family: 'DM Sans', sans-serif;
}

.search-bar input::placeholder { color: var(--text-muted); }
.search-bar svg { color: var(--text-muted); flex-shrink: 0; }

.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 0 16px;
  height: 36px;
  border-radius: var(--radius-sm);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s;
  border: none;
  font-family: 'DM Sans', sans-serif;
}

.btn-primary { background: var(--green); color: #fff; }
.btn-primary:hover { background: var(--green-dark); }
.btn-secondary { background: var(--bg); border: 1px solid var(--border); color: var(--text-primary); }
.btn-secondary:hover { border-color: #c0c8d8; background: #eef0f4; }
.btn-danger { background: #fee2e2; color: #a32d2d; }
.btn-danger:hover { background: #fecaca; }
.btn-ghost { background: transparent; color: var(--text-secondary); }
.btn-ghost:hover { background: var(--bg); }
.btn-sm { height: 30px; padding: 0 12px; font-size: 12px; }

.content-area {
  flex: 1;
  overflow: hidden;
  display: flex;
}

/* ─── VIEWS ─── */
.view { display: none; width: 100%; }
.view.active { display: flex; }

/* ─── DASHBOARD VIEW ─── */
#view-dashboard {
  flex-direction: column;
  overflow-y: auto;
  padding: 24px;
  gap: 20px;
}

.stats-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 14px;
}

.stat-card {
  background: var(--card-bg);
  border-radius: var(--radius);
  padding: 18px 20px;
  border: 1px solid var(--border);
  box-shadow: var(--shadow);
}

.stat-icon {
  width: 38px;
  height: 38px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  margin-bottom: 12px;
}

.stat-value {
  font-size: 28px;
  font-weight: 600;
  color: var(--text-primary);
  letter-spacing: -0.04em;
  font-family: 'DM Mono', monospace;
  line-height: 1;
}

.stat-label {
  font-size: 12px;
  color: var(--text-secondary);
  margin-top: 4px;
}

.stat-change {
  font-size: 11px;
  margin-top: 6px;
  font-weight: 500;
}

.stat-change.up { color: var(--green-dark); }
.stat-change.down { color: #e24b4a; }

.dashboard-grid {
  display: grid;
  grid-template-columns: 1fr 320px;
  gap: 20px;
}

.section-card {
  background: var(--card-bg);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  box-shadow: var(--shadow);
  overflow: hidden;
}

.section-header {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 10px;
}

.section-title {
  font-size: 14px;
  font-weight: 600;
  color: var(--text-primary);
}

.section-spacer { flex: 1; }

.section-sub {
  font-size: 12px;
  color: var(--text-secondary);
}

/* Funnel */
.funnel-list { padding: 12px 20px; }
.funnel-row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 8px 0;
  border-bottom: 1px solid #f5f6f9;
}

.funnel-row:last-child { border-bottom: none; }

.funnel-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.funnel-name { font-size: 13px; color: var(--text-primary); min-width: 120px; }
.funnel-bar-wrap { flex: 1; background: #f0f2f6; border-radius: 99px; height: 8px; overflow: hidden; }
.funnel-bar { height: 100%; border-radius: 99px; transition: width 0.6s ease; }
.funnel-count { font-size: 13px; font-weight: 600; color: var(--text-primary); font-family: 'DM Mono', monospace; min-width: 28px; text-align: right; }
.funnel-pct { font-size: 11px; color: var(--text-muted); min-width: 38px; text-align: right; }

/* Recent activity */
.activity-list { padding: 8px 0; }
.activity-item {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 10px 20px;
  border-bottom: 1px solid #f5f6f9;
}

.activity-item:last-child { border-bottom: none; }

.activity-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  margin-top: 5px;
  flex-shrink: 0;
}

.activity-text { font-size: 12.5px; color: var(--text-secondary); flex: 1; line-height: 1.5; }
.activity-text strong { color: var(--text-primary); font-weight: 500; }
.activity-time { font-size: 11px; color: var(--text-muted); white-space: nowrap; }

/* Pays distribution */
.pays-list { padding: 12px 20px; }
.pays-row { display: flex; align-items: center; gap: 10px; padding: 6px 0; }
.pays-flag { font-size: 16px; }
.pays-name { font-size: 13px; color: var(--text-primary); flex: 1; }
.pays-bar-wrap { width: 80px; background: #f0f2f6; border-radius: 99px; height: 6px; overflow: hidden; }
.pays-bar { height: 100%; border-radius: 99px; background: var(--green); }
.pays-cnt { font-size: 12px; color: var(--text-secondary); font-family: 'DM Mono', monospace; }

/* RDV today */
.rdv-list { padding: 8px 0; }
.rdv-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 20px;
  border-bottom: 1px solid #f5f6f9;
  cursor: pointer;
  transition: background 0.12s;
}

.rdv-item:hover { background: #f9fafb; }
.rdv-item:last-child { border-bottom: none; }

.rdv-time {
  font-size: 12px;
  font-weight: 600;
  font-family: 'DM Mono', monospace;
  color: var(--green-dark);
  min-width: 44px;
}

.rdv-info { flex: 1; }
.rdv-name { font-size: 13px; font-weight: 500; color: var(--text-primary); }
.rdv-detail { font-size: 11px; color: var(--text-secondary); margin-top: 1px; }

/* ─── CONTACTS VIEW ─── */
#view-contacts {
  flex-direction: column;
  overflow: hidden;
}

.contacts-toolbar {
  background: #fff;
  border-bottom: 1px solid var(--border);
  padding: 12px 24px;
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
}

.filter-chips {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}

.chip {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 4px 12px;
  border-radius: 99px;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  border: 1px solid var(--border);
  background: #fff;
  color: var(--text-secondary);
  transition: all 0.12s;
}

.chip:hover { border-color: #c0c8d8; }
.chip.active { border-color: transparent; color: #fff; }

.contacts-body {
  display: flex;
  flex: 1;
  overflow: hidden;
}

.contacts-table-wrap {
  flex: 1;
  overflow-y: auto;
}

.contacts-table {
  width: 100%;
  border-collapse: collapse;
}

.contacts-table thead th {
  background: #f9fafb;
  border-bottom: 1px solid var(--border);
  padding: 10px 16px;
  font-size: 11px;
  font-weight: 600;
  color: var(--text-muted);
  text-align: left;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  position: sticky;
  top: 0;
  z-index: 2;
}

.contacts-table tbody tr {
  border-bottom: 1px solid #f0f2f6;
  cursor: pointer;
  transition: background 0.10s;
}

.contacts-table tbody tr:hover { background: #f9fafb; }
.contacts-table tbody tr.selected { background: #f0fdf4; }

.contacts-table td {
  padding: 12px 16px;
  font-size: 13px;
  color: var(--text-primary);
  vertical-align: middle;
}

.contact-cell {
  display: flex;
  align-items: center;
  gap: 10px;
}

.c-avatar {
  width: 34px;
  height: 34px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: 600;
  flex-shrink: 0;
}

.c-name { font-weight: 500; font-size: 13.5px; }
.c-phone { font-size: 11.5px; color: var(--text-secondary); font-family: 'DM Mono', monospace; }

.tag-pill {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 3px 10px;
  border-radius: 99px;
  font-size: 11.5px;
  font-weight: 500;
}

.tag-dot { width: 6px; height: 6px; border-radius: 50%; }

.priority-badge {
  display: inline-flex;
  align-items: center;
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.02em;
}

.prio-haute { background: #fee2e2; color: #a32d2d; }
.prio-moyenne { background: #FEF3C7; color: #92400e; }
.prio-basse { background: #f0fdf4; color: #166534; }

/* Detail panel */
.detail-slide {
  width: 380px;
  border-left: 1px solid var(--border);
  background: #fff;
  overflow-y: auto;
  flex-shrink: 0;
  display: none;
}

.detail-slide.open { display: block; }

.detail-head {
  padding: 20px 20px 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: flex-start;
  gap: 14px;
}

.detail-avatar-lg {
  width: 52px;
  height: 52px;
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  font-weight: 600;
  flex-shrink: 0;
}

.detail-main-name { font-size: 15px; font-weight: 600; color: var(--text-primary); }
.detail-main-phone { font-size: 12.5px; color: var(--text-secondary); font-family: 'DM Mono', monospace; margin-top: 2px; }
.detail-main-country { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
.detail-close-btn { margin-left: auto; background: none; border: none; cursor: pointer; font-size: 18px; color: var(--text-muted); padding: 2px; }
.detail-close-btn:hover { color: var(--text-primary); }

.detail-section { padding: 16px 20px; border-bottom: 1px solid var(--border); }
.detail-section-title { font-size: 10.5px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 10px; }

.field-row {
  display: flex;
  align-items: center;
  margin-bottom: 8px;
}

.field-row label { font-size: 12px; color: var(--text-secondary); min-width: 110px; }
.field-row .field-val { font-size: 13px; color: var(--text-primary); font-weight: 500; }

.detail-label-select {
  width: 100%;
  padding: 8px 12px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  font-size: 13px;
  color: var(--text-primary);
  background: var(--bg);
  font-family: 'DM Sans', sans-serif;
  margin-top: 4px;
  cursor: pointer;
}

.detail-label-select:focus { outline: 2px solid var(--green); outline-offset: 1px; }

.note-area {
  width: 100%;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 10px 12px;
  font-size: 13px;
  color: var(--text-primary);
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  resize: vertical;
  min-height: 80px;
  line-height: 1.5;
}

.note-area:focus { outline: 2px solid var(--green); outline-offset: 1px; border-color: transparent; }

.detail-actions { padding: 14px 20px; display: flex; flex-direction: column; gap: 8px; }

.btn-wa {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  width: 100%;
  height: 40px;
  background: var(--green);
  color: #fff;
  border: none;
  border-radius: var(--radius-sm);
  font-size: 13.5px;
  font-weight: 600;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  transition: background 0.15s;
}

.btn-wa:hover { background: var(--green-dark); }

.btn-archive-full {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  width: 100%;
  height: 36px;
  background: #fee2e2;
  color: #a32d2d;
  border: none;
  border-radius: var(--radius-sm);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  transition: background 0.15s;
}

.btn-archive-full:hover { background: #fecaca; }

/* History timeline */
.history-item {
  display: flex;
  gap: 10px;
  padding: 6px 0;
  position: relative;
}

.history-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--green);
  margin-top: 4px;
  flex-shrink: 0;
}

.history-content { flex: 1; }
.history-action { font-size: 12.5px; color: var(--text-primary); }
.history-date { font-size: 11px; color: var(--text-muted); }

/* Priority select */
.prio-select {
  width: 100%;
  padding: 8px 12px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  font-size: 13px;
  color: var(--text-primary);
  background: var(--bg);
  font-family: 'DM Sans', sans-serif;
  cursor: pointer;
  margin-top: 4px;
}

/* ─── AGENDA VIEW ─── */
#view-agenda {
  flex-direction: column;
  overflow: hidden;
}

.agenda-layout {
  display: flex;
  flex: 1;
  overflow: hidden;
}

.agenda-sidebar {
  width: 300px;
  border-right: 1px solid var(--border);
  background: #fff;
  overflow-y: auto;
  flex-shrink: 0;
  padding: 16px;
}

.mini-cal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}

.mini-cal-title { font-size: 14px; font-weight: 600; color: var(--text-primary); }
.cal-nav-btn { background: none; border: 1px solid var(--border); border-radius: 6px; width: 28px; height: 28px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--text-secondary); }
.cal-nav-btn:hover { background: var(--bg); }

.mini-cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
.cal-day-header { font-size: 10px; font-weight: 600; color: var(--text-muted); text-align: center; padding: 4px 0; }
.cal-day {
  aspect-ratio: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12.5px;
  border-radius: 6px;
  cursor: pointer;
  color: var(--text-secondary);
  transition: all 0.12s;
}

.cal-day:hover { background: #f0f2f6; color: var(--text-primary); }
.cal-day.today { background: var(--green); color: #fff; font-weight: 600; }
.cal-day.selected { background: #dcf8c6; color: var(--green-dark); font-weight: 600; }
.cal-day.has-event::after { content: ''; display: block; width: 4px; height: 4px; border-radius: 50%; background: var(--green); position: absolute; bottom: 3px; left: 50%; transform: translateX(-50%); }
